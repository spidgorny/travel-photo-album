services:
  nextjs:
    build:
      context: .
      dockerfile: docker/nextjs/Dockerfile
    ports:
      - "4567:3000"
    depends_on:
      typesense:
        condition: service_healthy
      kvrocks:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      REDIS_URL: redis://kvrocks:6666
      THUMB_KV_URL: redis://kvrocks:6666
      BULLMQ_REDIS_URL: redis://redis:6379
      THUMB_QUEUE_URL: redis://redis:6379
      THUMB_QUEUE_NAME: thumb-jobs
      THUMB_QUEUE_PREFIX: travel-photo-album
      THUMB_TARGET_WIDTH: "256"
      REDIS_FOLDER_CACHE_TTL_SECONDS: "0"
      TYPESENSE_PROTOCOL: http
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: change-me-typesense-key
      TYPESENSE_COLLECTION: travel-photo-album-media
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - type: bind
        source: ${MEDIA_ROOT_HOST_PATH:-/Volumes/photo}
        target: ${MEDIA_ROOT_CONTAINER_PATH:-/media/nas/photo}
        read_only: true
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: sync+restart
          path: ./lib
          target: /app/lib
        - action: sync+restart
          path: ./public
          target: /app/public
        - action: sync+restart
          path: ./styles
          target: /app/styles
        - action: sync+restart
          path: ./types
          target: /app/types
        - action: sync+restart
          path: ./next.config.ts
          target: /app/next.config.ts
        - action: sync+restart
          path: ./.env
          target: /app/.env
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./yarn.lock

  typesense:
    image: typesense/typesense:29.0
    ports:
      - "8108:8108"
    command:
      - "--data-dir"
      - "/data"
      - "--api-key=${TYPESENSE_API_KEY:-change-me-typesense-key}"
      - "--enable-cors"
    volumes:
      - typesense_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8108 &&
          printf "GET /health HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n" >&3 &&
          grep -q "\"ok\":true" <&3'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  kvrocks:
    image: apache/kvrocks:latest
    user: "${KVROCKS_UID:-1000}:${KVROCKS_GID:-1000}"
    ports:
      - "6666:6666"
    command:
      - -c
      - /etc/kvrocks/kvrocks.conf
      - --pidfile
      - /var/lib/kvrocks/kvrocks.pid
    volumes:
      - ./kvrocks:/var/lib/kvrocks
      - ./docker/kvrocks/kvrocks.conf:/etc/kvrocks/kvrocks.conf:ro
    develop:
      watch:
        - action: sync+restart
          path: ./docker/kvrocks/kvrocks.conf
          target: /etc/kvrocks/kvrocks.conf
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -p
        - "6666"
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    volumes:
      - ./redis:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  media-worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    env_file:
      - .env
    command: npm run worker:media
    depends_on:
      typesense:
        condition: service_healthy
      kvrocks:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: ${MEDIA_WORKER_REDIS_URL:-redis://kvrocks:6666}
      THUMB_KV_URL: ${MEDIA_WORKER_THUMB_KV_URL:-redis://kvrocks:6666}
      BULLMQ_REDIS_URL: ${MEDIA_WORKER_BULLMQ_REDIS_URL:-redis://redis:6379}
      THUMB_QUEUE_URL: ${MEDIA_WORKER_THUMB_QUEUE_URL:-redis://redis:6379}
      THUMB_QUEUE_NAME: ${THUMB_QUEUE_NAME:-thumb-jobs}
      THUMB_QUEUE_PREFIX: ${THUMB_QUEUE_PREFIX:-travel-photo-album}
      BULLMQ_WORKER_CONCURRENCY: ${BULLMQ_WORKER_CONCURRENCY:-2}
      THUMB_KV_PREFIX: ${THUMB_KV_PREFIX:-travel-photo-album:thumb:v1}
      THUMB_TARGET_WIDTH: ${THUMB_TARGET_WIDTH:-256}
      REDIS_FOLDER_CACHE_TTL_SECONDS: ${REDIS_FOLDER_CACHE_TTL_SECONDS:-0}
      TYPESENSE_PROTOCOL: ${MEDIA_WORKER_TYPESENSE_PROTOCOL:-${TYPESENSE_PROTOCOL:-http}}
      TYPESENSE_HOST: ${MEDIA_WORKER_TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: ${MEDIA_WORKER_TYPESENSE_PORT:-${TYPESENSE_PORT:-8108}}
      TYPESENSE_API_KEY: ${MEDIA_WORKER_TYPESENSE_API_KEY:-${TYPESENSE_API_KEY:-change-me-typesense-key}}
      TYPESENSE_COLLECTION: ${MEDIA_WORKER_TYPESENSE_COLLECTION:-${TYPESENSE_COLLECTION:-travel-photo-album-media}}
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - type: bind
        source: ${MEDIA_ROOT_HOST_PATH:-/Volumes/photo}
        target: ${MEDIA_ROOT_CONTAINER_PATH:-/media/nas/photo}
        read_only: true
    develop:
      watch:
        - action: sync+restart
          path: ./lib
          target: /app/lib
        - action: sync+restart
          path: ./scripts
          target: /app/scripts
        - action: sync+restart
          path: ./test
          target: /app/test
        - action: sync+restart
          path: ./config.json
          target: /app/config.json
        - action: sync+restart
          path: ./.env
          target: /app/.env
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./yarn.lock
        - action: rebuild
          path: ./docker/worker/Dockerfile

  description-worker:
    build:
      context: .
      dockerfile: docker/description-worker/Dockerfile
    env_file:
      - .env
    depends_on:
      typesense:
        condition: service_healthy
      kvrocks:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: ${DESCRIPTION_WORKER_REDIS_URL:-redis://kvrocks:6666}
      THUMB_KV_URL: ${DESCRIPTION_WORKER_THUMB_KV_URL:-redis://kvrocks:6666}
      DESCRIPTION_QUEUE_URL: ${DESCRIPTION_WORKER_QUEUE_URL:-redis://redis:6379}
      DESCRIPTION_QUEUE_NAME: ${DESCRIPTION_QUEUE_NAME:-description-jobs}
      DESCRIPTION_QUEUE_PREFIX: ${DESCRIPTION_QUEUE_PREFIX:-travel-photo-album}
      DESCRIPTION_WORKER_CONCURRENCY: ${DESCRIPTION_WORKER_CONCURRENCY:-1}
      DESCRIPTION_WORKER_LOCK_DURATION_MS: ${DESCRIPTION_WORKER_LOCK_DURATION_MS:-${BULLMQ_WORKER_LOCK_DURATION_MS:-1800000}}
      THUMB_KV_PREFIX: ${THUMB_KV_PREFIX:-travel-photo-album:thumb:v1}
      THUMB_TARGET_WIDTH: ${THUMB_TARGET_WIDTH:-256}
      REDIS_FOLDER_CACHE_TTL_SECONDS: ${REDIS_FOLDER_CACHE_TTL_SECONDS:-0}
      OLLAMA_BASE_URL: ${DESCRIPTION_WORKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_CAPTION_PROMPT: ${OLLAMA_CAPTION_PROMPT:-}
      DESCRIPTION_WORKER_EMBEDDED_OLLAMA: ${DESCRIPTION_WORKER_EMBEDDED_OLLAMA:-0}
      TYPESENSE_PROTOCOL: ${DESCRIPTION_WORKER_TYPESENSE_PROTOCOL:-${TYPESENSE_PROTOCOL:-http}}
      TYPESENSE_HOST: ${DESCRIPTION_WORKER_TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: ${DESCRIPTION_WORKER_TYPESENSE_PORT:-${TYPESENSE_PORT:-8108}}
      TYPESENSE_API_KEY: ${DESCRIPTION_WORKER_TYPESENSE_API_KEY:-${TYPESENSE_API_KEY:-change-me-typesense-key}}
      TYPESENSE_COLLECTION: ${DESCRIPTION_WORKER_TYPESENSE_COLLECTION:-${TYPESENSE_COLLECTION:-travel-photo-album-media}}
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ollama_data:/root/.ollama
      - type: bind
        source: ${MEDIA_ROOT_HOST_PATH:-/Volumes/photo}
        target: ${MEDIA_ROOT_CONTAINER_PATH:-/media/nas/photo}
        read_only: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync+restart
          path: ./lib
          target: /app/lib
        - action: sync+restart
          path: ./scripts
          target: /app/scripts
        - action: sync+restart
          path: ./config.json
          target: /app/config.json
        - action: sync+restart
          path: ./.env
          target: /app/.env
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./yarn.lock
        - action: rebuild
          path: ./docker/description-worker/Dockerfile
        - action: rebuild
          path: ./docker/description-worker/entrypoint.sh

  search-indexer:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    env_file:
      - .env
    command: ["sh", "/app/docker/search-indexer/entrypoint.sh"]
    depends_on:
      typesense:
        condition: service_healthy
      kvrocks:
        condition: service_healthy
    environment:
      REDIS_URL: ${SEARCH_INDEXER_REDIS_URL:-redis://kvrocks:6666}
      THUMB_KV_URL: ${SEARCH_INDEXER_THUMB_KV_URL:-redis://kvrocks:6666}
      SEARCH_INDEX_INTERVAL_SECONDS: ${SEARCH_INDEX_INTERVAL_SECONDS:-3600}
      REDIS_FOLDER_CACHE_TTL_SECONDS: ${REDIS_FOLDER_CACHE_TTL_SECONDS:-0}
      TYPESENSE_PROTOCOL: ${SEARCH_INDEXER_TYPESENSE_PROTOCOL:-${TYPESENSE_PROTOCOL:-http}}
      TYPESENSE_HOST: ${SEARCH_INDEXER_TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: ${SEARCH_INDEXER_TYPESENSE_PORT:-${TYPESENSE_PORT:-8108}}
      TYPESENSE_API_KEY: ${SEARCH_INDEXER_TYPESENSE_API_KEY:-${TYPESENSE_API_KEY:-change-me-typesense-key}}
      TYPESENSE_COLLECTION: ${SEARCH_INDEXER_TYPESENSE_COLLECTION:-${TYPESENSE_COLLECTION:-travel-photo-album-media}}
      TYPESENSE_HEALTH_TIMEOUT_SECONDS: ${TYPESENSE_HEALTH_TIMEOUT_SECONDS:-60}
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - type: bind
        source: ${MEDIA_ROOT_HOST_PATH:-/Volumes/photo}
        target: ${MEDIA_ROOT_CONTAINER_PATH:-/media/nas/photo}
        read_only: true
    develop:
      watch:
        - action: sync+restart
          path: ./lib
          target: /app/lib
        - action: sync+restart
          path: ./scripts
          target: /app/scripts
        - action: sync+restart
          path: ./docker/search-indexer/entrypoint.sh
          target: /app/docker/search-indexer/entrypoint.sh
        - action: sync+restart
          path: ./config.json
          target: /app/config.json
        - action: sync+restart
          path: ./.env
          target: /app/.env
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./yarn.lock
        - action: rebuild
          path: ./docker/worker/Dockerfile

volumes:
  ollama_data:
  typesense_data:
